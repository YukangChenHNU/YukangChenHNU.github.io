<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f4f7f3">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>
    <header class="site-header">
      <div class="shell nav-wrap">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="返回首页">
          <span class="brand-mark">YC</span>
          <span>Yukang Chen</span>
        </a>
        <nav aria-label="主导航">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>主页</a>
          <a href="{{ '/projects/' | relative_url }}" {% if page.url contains '/projects' %}aria-current="page"{% endif %}>项目</a>
          <a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}aria-current="page"{% endif %}>博客</a>
          <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener">GitHub ↗</a>
        </nav>
      </div>
    </header>
    <main id="main">{{ content }}</main>
    <footer class="site-footer">
      <div class="shell footer-inner">
        <p>保持好奇，持续构建。</p>
        <p>© {{ 'now' | date: '%Y' }} Yukang Chen · Hosted on GitHub Pages</p>
      </div>
    </footer>
  </body>
</html>
