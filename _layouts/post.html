---
layout: default
---
<article class="post shell narrow">
  <a class="back-link" href="{{ '/blog/' | relative_url }}">← 返回博客</a>
  <header class="post-header">
    <p class="eyebrow">{{ page.date | date: "%Y.%m.%d" }}{% if page.category %} · {{ page.category }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="post-lead">{{ page.description }}</p>{% endif %}
  </header>
  <div class="prose">{{ content }}</div>
</article>
