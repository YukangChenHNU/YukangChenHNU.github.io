<!DOCTYPE html>
<html>
  {% include head.html %}

  <body>
    {% include header.html %}

    <div class="page-content">
      <div class="wrapper">
        <div class="work">
          <h1 class="page-heading">{{ page.title }}</h1>
          {{ content }}

          {% for item in page.items %}
          <div class="work-item">
            <div class="work-bubble work-mark" aria-hidden="true">{{ item.mark }}</div>
            <span class="work-text">
              {% if item.link %}
                <a href="{{ item.link }}" target="_blank" rel="noopener noreferrer"><strong>{{ item.title }}</strong></a>
              {% else %}
                <strong>{{ item.title }}</strong>
              {% endif %}
              &mdash;
              {{ item.description }}
            </span>
          </div>
          {% endfor %}
        </div>
      </div>
    </div>

    {% include footer.html %}
    {% include foot.html %}
  </body>
</html>
